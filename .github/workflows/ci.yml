name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: RSpec (${{ matrix.ruby }}, ${{ matrix.rails }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rails: Rails 7.0.3.1
            gemfile: gemfiles/rails_7_0.gemfile
            ruby: '3.1'
          - rails: Rails 7.0.3.1
            gemfile: gemfiles/rails_7_0.gemfile
            ruby: '3.2'
          - rails: Rails 7.1
            gemfile: gemfiles/rails_7_1.gemfile
            ruby: '3.1'
          - rails: Rails 7.1
            gemfile: gemfiles/rails_7_1.gemfile
            ruby: '3.2'
          - rails: Rails 7.2
            gemfile: gemfiles/rails_7_2.gemfile
            ruby: '3.1'
          - rails: Rails 7.2
            gemfile: gemfiles/rails_7_2.gemfile
            ruby: '3.2'
    env:
      BUNDLE_GEMFILE: ${{ matrix.gemfile }}
    steps:
      - uses: actions/checkout@v5
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - run: bundle exec rspec

  lint:
    name: RuboCop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true
      - run: bundle exec rubocop
